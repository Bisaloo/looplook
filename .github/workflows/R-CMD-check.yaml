# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          # - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}  # Bioc devel often missing packages
          - {os: ubuntu-latest,   r: 'release'}
          #- {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: false

      - name: Set shared R library path
        shell: Rscript {0}
        run: |
          lib <- file.path(Sys.getenv("RUNNER_TEMP"), "R-lib")
          cat(sprintf("R_LIBS_USER=%s\n", lib), file = Sys.getenv("GITHUB_ENV"), append = TRUE)

      - name: Install Ubuntu system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libssh2-1-dev \
            libuv1-dev \
            libcairo2-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff5-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            qpdf \
            ghostscript

      - name: Prepare shared R library
        shell: Rscript {0}
        run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          cat("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"), "\n", sep = "")
          print(.libPaths())

      - name: Install package dependencies
        shell: Rscript {0}
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          install.packages("BiocManager", repos = "https://cloud.r-project.org")
          repos <- BiocManager::repositories()
          repos["CRAN"] <- "https://cloud.r-project.org"
          options(repos = repos)
          install.packages(
            c("remotes", "rcmdcheck", "sessioninfo", "knitr", "rmarkdown", "testthat", "RSQLite"),
            dependencies = c("Depends", "Imports", "LinkingTo")
          )
          ensure_bioc <- function(pkgs, optional = FALSE, force = FALSE) {
            tryCatch(
              BiocManager::install(pkgs, ask = FALSE, update = FALSE, force = force),
              error = function(e) {
                if (optional) {
                  warning(paste(pkgs, collapse = ", "), " not available: ", e$message)
                } else {
                  stop(e)
                }
              }
            )
            missing <- pkgs[!vapply(pkgs, function(pkg) requireNamespace(pkg, quietly = TRUE), logical(1))]
            if (!length(missing)) return(invisible(TRUE))
            tryCatch(
              BiocManager::install(missing, ask = FALSE, update = FALSE, force = TRUE),
              error = function(e) {
                if (optional) {
                  warning(paste(missing, collapse = ", "), " not available after retry: ", e$message)
                } else {
                  stop(e)
                }
              }
            )
            missing <- missing[!vapply(missing, function(pkg) requireNamespace(pkg, quietly = TRUE), logical(1))]
            if (length(missing)) {
              msg <- paste("Failed to install/load:", paste(missing, collapse = ", "))
              if (optional) {
                warning(msg)
              } else {
                stop(msg)
              }
            }
          }
          ensure_bioc(c("AnnotationDbi", "GO.db", "GOSemSim"), force = TRUE)
          ensure_bioc(c("BiocStyle", "ChIPseeker"))
          ensure_bioc("karyoploteR", optional = TRUE)
          stopifnot(
            requireNamespace("rcmdcheck", quietly = TRUE),
            requireNamespace("knitr", quietly = TRUE),
            requireNamespace("rmarkdown", quietly = TRUE),
            requireNamespace("BiocStyle", quietly = TRUE),
            requireNamespace("ChIPseeker", quietly = TRUE)
          )
          if (!requireNamespace("karyoploteR", quietly = TRUE))
            warning("karyoploteR not available; karyotype plots will be skipped")
          remotes::install_deps(
            dependencies = c("Depends", "Imports", "LinkingTo"),
            upgrade = "never"
          )
          sessioninfo::session_info()

      - name: Run R CMD check
        env:
          _R_CHECK_FORCE_SUGGESTS_: "false"
          _R_CHECK_CRAN_INCOMING_: "false"
          _R_CHECK_CRAN_INCOMING_REMOTE_: "false"
          _R_CHECK_PACKAGES_USED_IGNORE_UNUSED_IMPORTS_: "false"
          _R_CHECK_DONTTEST_EXAMPLES_: "false"
          NOT_CRAN: "true"
        shell: Rscript {0}
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          stopifnot(requireNamespace("rcmdcheck", quietly = TRUE))
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            build_args = c("--no-manual", "--compact-vignettes=gs+qpdf"),
            error_on = "warning",
            check_dir = "check"
          )
