# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          #- {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: false

      - name: Set shared R library path
        shell: Rscript {0}
        run: |
          lib <- file.path(Sys.getenv("RUNNER_TEMP"), "R-lib")
          cat(sprintf("R_LIBS_USER=%s\n", lib), file = Sys.getenv("GITHUB_ENV"), append = TRUE)

      - name: Install Ubuntu system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libssh2-1-dev \
            libuv1-dev \
            libpng-dev \
            libjpeg-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            qpdf \
            ghostscript

      - name: Prepare shared R library
        shell: Rscript {0}
        run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          cat("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"), "\n", sep = "")
          print(.libPaths())

      - name: Install package dependencies
        shell: Rscript {0}
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          install.packages("BiocManager", repos = "https://cloud.r-project.org")
          repos <- BiocManager::repositories()
          repos["CRAN"] <- "https://cloud.r-project.org"
          options(repos = repos)
          install.packages(
            c("remotes", "rcmdcheck", "sessioninfo", "knitr", "rmarkdown"),
            dependencies = c("Depends", "Imports", "LinkingTo")
          )
          BiocManager::install("BiocStyle", ask = FALSE, update = FALSE)
          stopifnot(
            requireNamespace("rcmdcheck", quietly = TRUE),
            requireNamespace("knitr", quietly = TRUE),
            requireNamespace("rmarkdown", quietly = TRUE),
            requireNamespace("BiocStyle", quietly = TRUE)
          )
          remotes::install_deps(dependencies = TRUE, upgrade = "never")
          sessioninfo::session_info()

      - name: Run R CMD check
        shell: Rscript {0}
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          stopifnot(requireNamespace("rcmdcheck", quietly = TRUE))
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            build_args = c("--no-manual", "--compact-vignettes=gs+qpdf"),
            error_on = "warning",
            check_dir = "check"
          )
