# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_LIBS_USER: ${{ runner.temp }}/R-lib
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - name: Prepare shared R library
        shell: Rscript {0}
        run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          cat("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"), "\n", sep = "")
          print(.libPaths())

      - name: Install site dependencies
        shell: Rscript {0}
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          install.packages("BiocManager")
          options(repos = BiocManager::repositories())
          install.packages(c("remotes", "pkgdown", "knitr", "rmarkdown", "BiocStyle"))
          remotes::install_deps(dependencies = TRUE, upgrade = "never")
          remotes::install_local(upgrade = "never", dependencies = FALSE)

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
