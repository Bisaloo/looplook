# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - name: Set shared R library path
        shell: Rscript {0}
        run: |
          lib <- file.path(Sys.getenv("RUNNER_TEMP"), "R-lib")
          cat(sprintf("R_LIBS_USER=%s\n", lib), file = Sys.getenv("GITHUB_ENV"), append = TRUE)

      - name: Install Ubuntu system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libssh2-1-dev \
            libuv1-dev \
            libcairo2-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff5-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            qpdf \
            ghostscript

      - name: Prepare shared R library
        shell: Rscript {0}
        run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          cat("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"), "\n", sep = "")
          print(.libPaths())

      - name: Install site dependencies
        shell: Rscript {0}
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          install.packages("BiocManager", repos = "https://cloud.r-project.org")
          repos <- BiocManager::repositories()
          repos["CRAN"] <- "https://cloud.r-project.org"
          options(repos = repos)
          install.packages(
            c("remotes", "pkgdown", "knitr", "rmarkdown", "ragg", "RSQLite"),
            dependencies = c("Depends", "Imports", "LinkingTo")
          )
          ensure_bioc <- function(pkgs, force = FALSE) {
            BiocManager::install(pkgs, ask = FALSE, update = FALSE, force = force)
            missing <- pkgs[!vapply(pkgs, function(pkg) requireNamespace(pkg, quietly = TRUE), logical(1))]
            if (!length(missing)) return(invisible(TRUE))
            BiocManager::install(missing, ask = FALSE, update = FALSE, force = TRUE)
            missing <- missing[!vapply(missing, function(pkg) requireNamespace(pkg, quietly = TRUE), logical(1))]
            if (length(missing)) {
              stop("Failed to install/load: ", paste(missing, collapse = ", "))
            }
          }
          ensure_bioc(c("AnnotationDbi", "GO.db", "GOSemSim"), force = TRUE)
          ensure_bioc(c("BiocStyle", "karyoploteR", "ChIPseeker"))
          stopifnot(
            requireNamespace("pkgdown", quietly = TRUE),
            requireNamespace("ragg", quietly = TRUE),
            requireNamespace("knitr", quietly = TRUE),
            requireNamespace("rmarkdown", quietly = TRUE),
            requireNamespace("BiocStyle", quietly = TRUE),
            requireNamespace("karyoploteR", quietly = TRUE),
            requireNamespace("ChIPseeker", quietly = TRUE)
          )
          remotes::install_deps(
            dependencies = c("Depends", "Imports", "LinkingTo"),
            upgrade = "never"
          )
          remotes::install_local(upgrade = "never", dependencies = FALSE)

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
