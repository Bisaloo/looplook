url: https://zying106.github.io/looplook/
template:
  bootstrap: 5
  bootswatch: cerulean
  ganalytics: UA-XXXXX-Y
  includes:
    in_header: |
      <style>
      .template-article .row > main,
      .template-reference .row > main {
        min-width: 0;
      }

      .template-article div.sourceCode,
      .template-article pre,
      .template-reference div.sourceCode,
      .template-reference pre {
        max-width: 100%;
      }

      .template-article div.sourceCode,
      .template-reference div.sourceCode {
        overflow-x: auto;
        overflow-y: hidden;
      }

      .template-article div.sourceCode pre,
      .template-article pre:not([class]),
      .template-reference div.sourceCode pre,
      .template-reference pre:not([class]) {
        white-space: pre;
        word-break: normal;
        overflow-wrap: normal;
        margin-bottom: 0;
      }

      .template-article p,
      .template-article li,
      .template-article td,
      .template-article th,
      .template-article a,
      .template-article code:not(pre code),
      .template-reference p,
      .template-reference li,
      .template-reference td,
      .template-reference th,
      .template-reference a,
      .template-reference code:not(pre code) {
        overflow-wrap: anywhere;
        word-wrap: break-word;
      }

      .template-article .table-responsive,
      .template-article table,
      .template-reference .table-responsive,
      .template-reference table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
      }

      @media (min-width: 768px) and (max-width: 1199.98px) {
        .template-article .row > main,
        .template-reference .row > main,
        .template-article .row > aside,
        .template-reference .row > aside {
          flex: 0 0 100%;
          max-width: 100%;
        }

        .template-article .row > aside,
        .template-reference .row > aside {
          margin-top: 1.5rem;
        }
      }
      </style>

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
    articles:
      text: Tutorials
      menu:
        - text: "Comprehensive Workflow: From Raw Loops to Functional Hubs"
          href: articles/looplook.html

reference:
  - title: "Module 1: Data Consolidation & Preprocessing"
    desc: "Foundational data-cleaning engine for merging and standardizing 3D interactomes."
    contents:
      - consolidate_chromatin_loops
      - bedpe_to_gi            # 新增：文件格式转换工具
      - reduce_ginteractions   # 新增：GenomicInteractions 简化工具

  - title: "Module 2: 3D-Guided Peak Annotation"
    desc: "The core mapping engine for resolving 1D-to-3D spatial target assignments."
    contents:
      - annotate_peaks_and_loops

  - title: "Module 3: Expression-Aware Refinement"
    desc: "Advanced logic for eliminating transcriptionally silent contacts using RNA-seq data."
    contents:
      - refine_loop_anchors_by_expression
      - validate_epeG_by_chromatin

  - title: "Module 4: Automated Functional Profiling"
    desc: "End-to-end integration with JASPAR motifs, GO enrichment, and PPI networks."
    contents:
      - profile_target_genes

  - title: "Module 5: IGV-Style & Statistical Visualization"
    desc: "Publication-ready tools for rendering genomic tracks and statistical summaries."
    contents:
      - plot_peaks_interactions
      - draw_flower_simplified    # 新增：花瓣图/维恩图展示
      - draw_upset_intersections  # 新增：UpSet 交互分析图

  - title: "Package Overview & Report"
    desc: "Package-level documentation and one-click HTML report generation."
    contents:
      - looplook-package
      - looplook_report

  - title: "Auxiliary Utilities"
    desc: "Internal helper functions for file handling and data parsing."
    contents:
      - read_simple_bed
      - print.looplook_karyo

sidebar:
  structure: [links, license, community, citation, dev]

development:
  mode: release
